// Advanced Reports 4.5.0
// Edit this file, then reload AdvancedReports.smx or restart the server.

// SourceMod databases.cfg entry. "storage-local" uses built-in SQLite and needs no setup.
// Change this to "advancedreports" to use the optional MySQL example from the README.
sm_advreports_database "storage-local"

// Seconds each player must wait between successful reports. Use 0 to disable.
sm_advreports_cooldown "60.0"

// Seconds before the same reporter can report the same target again.
// This is separate from the general cooldown. Use 0 to disable.
sm_advreports_duplicate_window "600"

// Allow report reasons marked "custom" in advreasons.cfg to collect private chat input.
sm_advreports_custom_reasons "1"

// Notify online admins with access to !reports whenever a report is saved.
sm_advreports_notify_admins "1"

// Sound played to notified admins. Leave blank to disable the sound.
sm_advreports_admin_sound "buttons/button17.wav"

// Hide admins with sm_advreports_immunity access from the player report menu.
// Disabled by default. The access check defaults to the ban flag and supports overrides.
sm_advreports_protect_admins "0"

// Send successful player reports to Discord. Requires SteamWorks and a webhook URL.
sm_advreports_discord "0"

// Your private Discord webhook URL. Never publish or commit a real webhook.
sm_advreports_webhook ""

// Public IP:port shown in reports and used for redirects.
// Leave blank to derive it from the server's hostip and hostport ConVars.
sm_advreports_server_address ""
